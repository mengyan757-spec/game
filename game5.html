<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第五关 · 组队闯关</title>
  <link rel="stylesheet" href="style.css">
  <script src="utils.js"></script>
</head>
<body>
  <div class="festival-decoration"></div>

  <!-- 顶部导航 -->
  <nav class="nav-bar">
    <button class="nav-back" onclick="window.location.href='index.html'">← 返回首页</button>
    <span class="nav-title">🤝 第五关 · 组队闯关</span>
    <span style="font-size: 0.85rem; color: var(--color-text-light);">团队合作</span>
  </nav>

  <main class="container">
    <!-- 组队设置面板 -->
    <div id="setupPanel" class="animate-fade-in-up">
      <div class="card chinese-border" style="text-align: center; padding: 40px 24px;">
        <div style="font-size: 4rem; margin-bottom: 12px;">🤝</div>
        <h2 class="page-title">组队闯关 · 团结就是力量</h2>
        <p class="page-subtitle">
          2~4 位小伙伴组成团队，共同讨论回答问题！
        </p>

        <!-- 队名 -->
        <div style="max-width: 360px; margin: 0 auto 16px;">
          <label style="font-weight: 600; display: block; margin-bottom: 4px;">🏷️ 队伍名称</label>
          <input type="text" id="teamName" placeholder="给你的队伍取个名字" maxlength="10"
            style="width:100%; padding:12px 16px; border:2px solid #E8D5C4; border-radius:12px;
                   font-size:1rem; font-family:inherit; text-align:center; outline:none;">
        </div>

        <!-- 成员 -->
        <div style="max-width: 360px; margin: 0 auto 16px;">
          <label style="font-weight: 600; display: block; margin-bottom: 8px;">👥 队伍成员（2~4人）</label>
          <div id="memberInputs">
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
              <span style="font-size: 1.2rem;">🧑</span>
              <input type="text" class="member-name" placeholder="成员1 姓名" maxlength="8"
                style="flex:1; padding:10px 14px; border:2px solid #E8D5C4; border-radius:10px;
                       font-size:0.95rem; font-family:inherit; outline:none;">
            </div>
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
              <span style="font-size: 1.2rem;">🧑</span>
              <input type="text" class="member-name" placeholder="成员2 姓名" maxlength="8"
                style="flex:1; padding:10px 14px; border:2px solid #E8D5C4; border-radius:10px;
                       font-size:0.95rem; font-family:inherit; outline:none;">
            </div>
          </div>
          <div style="display: flex; gap: 8px; justify-content: center;">
            <button class="btn btn-ghost btn-sm" onclick="addMemberInput()">+ 添加成员</button>
            <button class="btn btn-ghost btn-sm" onclick="removeMemberInput()">- 减少成员</button>
          </div>
        </div>

        <div style="margin: 16px 0;">
          <p style="font-weight: 600; margin-bottom: 12px;">选择难度：</p>
          <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <button class="btn btn-outline btn-sm diff-btn active" data-diff="easy" data-count="8">🌟 入门 · 8题</button>
            <button class="btn btn-outline btn-sm diff-btn" data-diff="medium" data-count="12">🌟🌟 挑战 · 12题</button>
            <button class="btn btn-outline btn-sm diff-btn" data-diff="hard" data-count="16">🌟🌟🌟 困难 · 16题</button>
          </div>
        </div>

        <button class="btn btn-primary btn-lg" onclick="startTeamGame()" style="margin-top: 8px;">
          🚀 团队出发！
        </button>

        <div style="margin-top: 16px; padding: 12px; background: #F4ECF7; border-radius: 12px; font-size: 0.85rem;">
          💡 <strong>玩法：</strong>每人轮流担任"答题手"，其余队员讨论提供建议。<br>
          答对得10分，答错不扣分。团结协作赢取高分！
        </div>
      </div>
    </div>

    <!-- 游戏面板 -->
    <div id="gamePanel" class="hidden">
      <!-- 状态栏 -->
      <div class="card" style="margin-bottom: 12px; padding: 16px;">
        <div class="flex-between" style="flex-wrap: wrap; gap: 8px;">
          <span style="font-weight: 700;" id="teamDisplay"></span>
          <span>🏆 团队得分：<strong id="teamScore" style="color: var(--color-primary); font-size: 1.2rem;">0</strong></span>
          <span id="currentAnswerer" style="font-weight: 600;"></span>
        </div>
        <div style="margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap;">
          <span style="font-size: 0.8rem; color: var(--color-text-light);">队员：</span>
          <div id="memberBadges" style="display: flex; gap: 4px; flex-wrap: wrap;"></div>
        </div>
        <div class="progress-bar" style="margin-top: 10px;">
          <div id="teamProgress" class="progress-fill" style="width: 0%;"></div>
        </div>
      </div>

      <!-- 讨论阶段 -->
      <div id="discussPhase">
        <div class="card chinese-border animate-fade-in" style="text-align: center; padding: 32px 24px;">
          <div style="font-size: 3rem;">🗣️</div>
          <h3 style="margin: 16px 0 8px;">讨论时间！</h3>
          <p style="color: var(--color-text-light); margin-bottom: 4px;">
            当前答题手：<strong id="discussAnswerer" style="color: var(--color-primary);"></strong>
          </p>
          <p style="font-size: 0.85rem; color: var(--color-text-light);">
            其他队员：快和答题手一起讨论吧！
          </p>
          <div style="font-size: 2rem; font-weight: 900; color: var(--color-primary); margin: 12px 0;" id="discussCountdown">
            ⏱️ 10
          </div>
          <p style="font-size: 0.85rem; color: var(--color-text-light);">讨论倒计时结束后自动进入答题</p>
          <button class="btn btn-primary" onclick="endDiscussEarly()" style="margin-top: 8px;">
            讨论好了，开始答题！
          </button>
        </div>
      </div>

      <!-- 答题阶段 -->
      <div id="answerPhase" class="hidden">
        <div class="card chinese-border animate-fade-in" style="padding: 28px 24px;">
          <span id="festivalBadge" class="festival-badge" style="margin-bottom: 12px; display: inline-block;"></span>
          <h3 id="questionText" style="font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; line-height: 1.6;"></h3>
          <div id="optionsList"></div>
          <div id="feedbackArea" class="hidden" style="margin-top: 16px; padding: 16px; border-radius: 12px;"></div>
        </div>
      </div>
    </div>

    <!-- 结果面板 -->
    <div id="resultPanel" class="hidden">
      <div class="card chinese-border animate-bounce-in" style="text-align: center; padding: 40px 24px;">
        <div style="font-size: 5rem;" id="resultEmoji"></div>
        <h2 class="page-title" id="resultTitle"></h2>
        <div style="margin: 16px 0; font-size: 1.1rem; line-height: 2;">
          <p>🏷️ 队伍：<strong id="rTeamName"></strong></p>
          <p>👥 成员：<span id="rMembers"></span></p>
          <p>🏆 总得分：<strong id="rScore" style="color: var(--color-primary); font-size: 1.5rem;"></strong></p>
          <p>✅ 正确：<strong id="rCorrect" style="color: #27AE60;"></strong></p>
          <p>❌ 错误：<strong id="rWrong" style="color: #E74C3C;"></strong></p>
          <p id="teamBadge" style="font-size: 1.3rem;"></p>
        </div>
        <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
          <button class="btn btn-primary" onclick="restartTeam()">🔄 再来一次</button>
          <a href="index.html" class="btn btn-ghost">🏠 返回首页</a>
        </div>
      </div>
    </div>

    <!-- 轮换提示 -->
    <div id="swapModal" class="modal-overlay hidden">
      <div class="modal-content" style="text-align: center;">
        <div style="font-size: 4rem;">🔄</div>
        <h3 style="margin: 12px 0;">答题手轮换！</h3>
        <p style="margin-bottom: 8px;">下一题由 <strong id="nextAnswerer" style="color: var(--color-primary); font-size: 1.2rem;"></strong> 来回答</p>
        <p style="font-size: 0.85rem; color: var(--color-text-light);">其他队员记得帮忙讨论哦~</p>
        <button class="btn btn-primary" onclick="closeSwapModal()" style="margin-top: 16px;">收到！</button>
      </div>
    </div>
  </main>

  <script>
    // ==================== 状态 ====================
    let teamName = '';
    let members = [];
    let questions = [];
    let currentQuestionIdx = 0;
    let teamScore = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let currentAnswererIdx = 0;
    let isAnswering = false;
    let discussTimer = null;
    let discussSeconds = 10;
    let totalQuestions = 8;

    // 难度按钮
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        totalQuestions = parseInt(this.dataset.count);
      });
    });

    // ==================== 成员管理 ====================
    function addMemberInput() {
      const container = document.getElementById('memberInputs');
      const current = container.querySelectorAll('.member-name').length;
      if (current >= 4) { showToast('最多4位成员哦~'); return; }
      const div = document.createElement('div');
      div.style.cssText = 'display: flex; gap: 8px; margin-bottom: 8px;';
      div.innerHTML = `<span style="font-size:1.2rem;">🧑</span>
        <input type="text" class="member-name" placeholder="成员${current+1} 姓名" maxlength="8"
          style="flex:1; padding:10px 14px; border:2px solid #E8D5C4; border-radius:10px;
                 font-size:0.95rem; font-family:inherit; outline:none;">`;
      container.appendChild(div);
    }

    function removeMemberInput() {
      const container = document.getElementById('memberInputs');
      const inputs = container.querySelectorAll('.member-name');
      if (inputs.length <= 2) { showToast('至少需要2位成员'); return; }
      inputs[inputs.length - 1].parentElement.remove();
    }

    // ==================== 开始游戏 ====================
    function startTeamGame() {
      teamName = document.getElementById('teamName').value.trim() || '无名小队';
      const inputs = document.querySelectorAll('.member-name');
      members = [];
      inputs.forEach(inp => {
        const name = inp.value.trim();
        if (name) members.push(name);
      });

      if (members.length < 2) { showToast('请至少填写2位成员姓名！'); return; }
      // 去重
      if (new Set(members).size !== members.length) { showToast('队员名字不能重复哦！'); return; }

      teamScore = 0;
      correctCount = 0;
      wrongCount = 0;
      currentQuestionIdx = 0;
      currentAnswererIdx = 0;
      isAnswering = false;

      // 准备题目（合并两个题库）
      let pool = [...shuffle(QUIZ_BANK), ...shuffle(VS_QUIZ_BANK)];
      pool = shuffle(pool);
      while (pool.length < totalQuestions) {
        pool = pool.concat(shuffle([...QUIZ_BANK, ...VS_QUIZ_BANK]));
      }
      questions = pool.slice(0, totalQuestions);

      document.getElementById('setupPanel').classList.add('hidden');
      document.getElementById('gamePanel').classList.remove('hidden');
      document.getElementById('resultPanel').classList.add('hidden');

      document.getElementById('teamDisplay').textContent = '🤝 ' + teamName;
      document.getElementById('teamScore').textContent = '0';
      updateMemberBadges();
      startDiscussPhase();
    }

    // ==================== 更新队员徽章 ====================
    function updateMemberBadges() {
      document.getElementById('memberBadges').innerHTML = members.map((m, i) => {
        const colors = ['#E74C3C', '#2980B9', '#27AE60', '#8E44AD'];
        const isActive = i === currentAnswererIdx;
        return `<span class="festival-badge" style="background:${isActive ? colors[i] : '#EEE'};
                color:${isActive ? '#FFF' : '#666'}; transition: all 0.3s;">
                ${isActive ? '✋' : '👤'} ${m}
              </span>`;
      }).join('');
      document.getElementById('currentAnswerer').textContent =
        '✋ 答题手：' + members[currentAnswererIdx];
    }

    // ==================== 讨论阶段 ====================
    function startDiscussPhase() {
      isAnswering = false;
      clearInterval(discussTimer);
      discussSeconds = 10;

      document.getElementById('discussPhase').classList.remove('hidden');
      document.getElementById('answerPhase').classList.add('hidden');

      document.getElementById('discussAnswerer').textContent = members[currentAnswererIdx];
      document.getElementById('discussCountdown').textContent = '⏱️ ' + discussSeconds;

      discussTimer = setInterval(() => {
        discussSeconds--;
        document.getElementById('discussCountdown').textContent = '⏱️ ' + discussSeconds;
        if (discussSeconds <= 0) {
          clearInterval(discussTimer);
          startAnswerPhase();
        }
      }, 1000);
    }

    function endDiscussEarly() {
      clearInterval(discussTimer);
      startAnswerPhase();
    }

    // ==================== 答题阶段 ====================
    function startAnswerPhase() {
      isAnswering = true;
      document.getElementById('discussPhase').classList.add('hidden');
      document.getElementById('answerPhase').classList.remove('hidden');
      document.getElementById('feedbackArea').classList.add('hidden');

      const q = questions[currentQuestionIdx];
      const festival = FESTIVAL_DATA[q.festival];

      document.getElementById('teamProgress').style.width =
        (currentQuestionIdx / questions.length * 100) + '%';

      const badge = document.getElementById('festivalBadge');
      badge.textContent = festival.emoji + ' ' + festival.name;
      badge.style.background = festival.bgColor;
      badge.style.color = festival.color;

      document.getElementById('questionText').textContent =
        `[第${currentQuestionIdx + 1}/${questions.length}题] ${q.question}`;

      const labels = ['A', 'B', 'C', 'D'];
      document.getElementById('optionsList').innerHTML = q.options.map((opt, i) => `
        <button class="option-btn" onclick="teamAnswer(${i})">
          <span style="display: inline-block; width: 28px; height: 28px; line-height: 28px;
                       background: var(--color-bg); border-radius: 50%; text-align: center;
                       font-weight: 700; font-size: 0.85rem; margin-right: 8px;">${labels[i]}</span>
          ${opt}
        </button>
      `).join('');

      // 动画
      const card = document.getElementById('answerPhase').querySelector('.card');
      if (card) {
        card.classList.remove('animate-fade-in');
        void card.offsetWidth;
        card.classList.add('animate-fade-in');
      }
    }

    // ==================== 团队回答 ====================
    function teamAnswer(userIndex) {
      if (!isAnswering) return;
      isAnswering = false;

      const q = questions[currentQuestionIdx];
      const isCorrect = userIndex === q.answer;

      disableAllOptions();
      const allBtns = document.querySelectorAll('#optionsList .option-btn');
      allBtns[q.answer].classList.add('correct');

      if (isCorrect) {
        teamScore += 10;
        correctCount++;
        allBtns[userIndex].classList.add('correct');
      } else {
        wrongCount++;
        allBtns[userIndex].classList.add('wrong');
        saveErrorQuestion({
          id: q.id, festival: q.festival, question: q.question,
          options: q.options, correctAnswer: q.answer,
          userAnswer: userIndex, knowledge: q.knowledge,
        });
      }

      document.getElementById('teamScore').textContent = teamScore;

      const feedback = document.getElementById('feedbackArea');
      feedback.classList.remove('hidden');
      if (isCorrect) {
        feedback.style.background = '#E8F8F5';
        feedback.style.border = '1px solid #27AE60';
        feedback.innerHTML = `
          <div class="flex-center gap-2" style="margin-bottom: 8px;">
            <span>🎉</span><strong style="color: #27AE60;">团队答对！+10分！</strong>
          </div>
          <p>💡 ${q.knowledge}</p>
        `;
      } else {
        feedback.style.background = '#FDEDEC';
        feedback.style.border = '1px solid #E74C3C';
        feedback.innerHTML = `
          <div class="flex-center gap-2" style="margin-bottom: 8px;">
            <span>😢</span><strong style="color: #E74C3C;">答错了！正确答案：${q.options[q.answer]}</strong>
          </div>
          <p>💡 ${q.knowledge}</p>
        `;
      }

      setTimeout(advanceQuestion, 2000);
    }

    function disableAllOptions() {
      document.querySelectorAll('#optionsList .option-btn').forEach(b => b.disabled = true);
    }

    // ==================== 推进下一题 ====================
    function advanceQuestion() {
      currentQuestionIdx++;
      // 轮换答题手
      currentAnswererIdx = (currentAnswererIdx + 1) % members.length;
      updateMemberBadges();

      if (currentQuestionIdx >= questions.length) {
        showTeamResult();
        return;
      }

      // 显示轮换提示
      document.getElementById('nextAnswerer').textContent = members[currentAnswererIdx];
      document.getElementById('swapModal').classList.remove('hidden');
    }

    function closeSwapModal() {
      document.getElementById('swapModal').classList.add('hidden');
      startDiscussPhase();
      document.getElementById('gamePanel').scrollIntoView({ behavior: 'smooth' });
    }

    document.getElementById('swapModal').addEventListener('click', function(e) {
      if (e.target === this) closeSwapModal();
    });

    // ==================== 团队结果 ====================
    function showTeamResult() {
      clearInterval(discussTimer);

      document.getElementById('gamePanel').classList.add('hidden');
      document.getElementById('resultPanel').classList.remove('hidden');

      document.getElementById('rTeamName').textContent = teamName;
      document.getElementById('rMembers').textContent = members.join('、');
      document.getElementById('rScore').textContent = teamScore + ' 分';
      document.getElementById('rCorrect').textContent = correctCount + ' 题';
      document.getElementById('rWrong').textContent = wrongCount + ' 题';

      const maxScore = totalQuestions * 10;
      const ratio = teamScore / maxScore;
      let emoji, title, badgeText;
      if (ratio >= 0.9) {
        emoji = '👑'; title = '传说级团队！'; badgeText = '👑 传说团队勋章';
      } else if (ratio >= 0.7) {
        emoji = '🌟'; title = '超强团队！'; badgeText = '🌟 黄金团队勋章';
      } else if (ratio >= 0.5) {
        emoji = '💪'; title = '不错的小队！'; badgeText = '💪 白银团队勋章';
      } else {
        emoji = '📚'; title = '继续加油！'; badgeText = '📚 再接再厉！';
      }

      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('teamBadge').textContent = badgeText;

      // 保存
      saveTeamRecord({
        teamName, members, totalQuestions,
        score: teamScore, correctCount, wrongCount,
      });

      document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth' });
      createStars();
    }

    // ==================== 重新开始 ====================
    function restartTeam() {
      clearInterval(discussTimer);
      document.getElementById('setupPanel').classList.remove('hidden');
      document.getElementById('gamePanel').classList.add('hidden');
      document.getElementById('resultPanel').classList.add('hidden');
    }

    // ==================== 撒花 ====================
    function createStars() {
      const emojis = ['⭐', '🌟', '✨', '🎉', '🤝', '👑', '🎊', '💪'];
      for (let i = 0; i < 35; i++) {
        setTimeout(() => {
          const star = document.createElement('span');
          star.className = 'star-particle';
          star.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          star.style.left = Math.random() * 90 + '%';
          star.style.top = (Math.random() * 40 + 40) + '%';
          document.body.appendChild(star);
          setTimeout(() => star.remove(), 1500);
        }, i * 50);
      }
    }
  </script>
</body>
</html>
