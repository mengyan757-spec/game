<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中华传统节日文化闯关小游戏</title>
  <link rel="stylesheet" href="style.css">
  <script src="utils.js"></script>
</head>
<body>
  <div class="festival-decoration"></div>

  <main class="container">

    <!-- ========== 第一屏：入口选择 ========== -->
    <div id="step1" class="animate-fade-in">
      <div class="text-center" style="margin-top: 50px;">
        <div style="font-size:3.5rem;">🏮</div>
        <h1 class="page-title" style="font-size:2rem;">中华传统节日文化<br>闯关小游戏</h1>
        <p style="color:var(--color-text-light);margin-top:8px;font-size:0.95rem;">了解传统节日 · 学习中华文化</p>
      </div>

      <!-- 节日标签（动画） -->
      <div class="festival-row" style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:24px 0;perspective:600px;">
        <span class="festival-tag tag-0" data-text="🧧 春节" style="background:#FDEDEC;color:#E74C3C;"></span>
        <span class="festival-tag tag-1" data-text="🏮 元宵" style="background:#FEF5E7;color:#F39C12;"></span>
        <span class="festival-tag tag-2" data-text="🌿 清明" style="background:#E8F8F5;color:#27AE60;"></span>
        <span class="festival-tag tag-3" data-text="🐲 端午" style="background:#EBF5FB;color:#2980B9;"></span>
        <span class="festival-tag tag-4" data-text="🥮 中秋" style="background:#FEF9E7;color:#D4AC0D;"></span>
        <span class="festival-tag tag-5" data-text="💫 七夕" style="background:#F4ECF7;color:#8E44AD;"></span>
        <span class="festival-tag tag-6" data-text="🏔️ 重阳" style="background:#FDF2E9;color:#E67E22;"></span>
        <span class="festival-tag tag-7" data-text="❄️ 冬至" style="background:#E8F8F5;color:#1ABC9C;"></span>
      </div>

      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;margin-top:30px;">
        <!-- 学生入口 - 大按钮 -->
        <button class="btn btn-primary" onclick="goStep2()"
          style="width:260px;padding:24px;font-size:1.3rem;border-radius:20px;
                 flex-direction:column;display:flex;align-items:center;gap:6px;">
          <span style="font-size:2.5rem;">🎒</span>
          <span>学生入口</span>
          <span style="font-size:0.75rem;opacity:0.8;">开始闯关学习</span>
        </button>

        <!-- 教师入口 - 小按钮 -->
        <a href="teacher.html" class="btn btn-ghost"
          style="width:200px;padding:14px;font-size:0.95rem;border-radius:14px;
                 flex-direction:column;display:flex;align-items:center;gap:4px;text-decoration:none;">
          <span style="font-size:1.5rem;">👩‍🏫</span>
          <span>教师入口</span>
          <span style="font-size:0.7rem;opacity:0.6;">查看学习统计</span>
        </a>
      </div>
    </div>

    <!-- ========== 第二屏：模式选择 ========== -->
    <div id="step2" class="hidden animate-fade-in">
      <div style="text-align:center;margin-top:10px;">
        <button class="nav-back" onclick="goStep1()" style="margin-bottom:10px;">← 返回</button>
      </div>

      <div class="text-center" style="margin-top:20px;">
        <div style="font-size:3rem;">🎒</div>
        <h2 class="page-title">选择闯关模式</h2>
        <p class="page-subtitle">你想一个人闯关，还是和朋友一起？</p>
      </div>

      <!-- 名字输入 -->
      <div style="max-width:300px;margin:0 auto 24px;">
        <input type="text" id="studentNameInput" placeholder="请输入你的姓名" maxlength="10"
          style="width:100%;padding:12px;border:2px solid #E8D5C4;border-radius:12px;
                 font-size:1rem;font-family:inherit;text-align:center;outline:none;">
        <p id="nameWarn" style="text-align:center;color:#E74C3C;font-size:0.8rem;margin-top:4px;display:none;">
          请先输入名字
        </p>
      </div>

      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
        <!-- 单人闯关 -->
        <button class="btn" onclick="goStep3('single')"
          style="width:260px;padding:22px;border-radius:20px;flex-direction:column;display:flex;
                 align-items:center;gap:6px;background:linear-gradient(135deg,#E74C3C,#C0392B);
                 color:#FFF;font-size:1.2rem;box-shadow:0 4px 18px rgba(231,76,60,0.3);">
          <span style="font-size:2.2rem;">🎮</span>
          <span>单人闯关</span>
          <span style="font-size:0.75rem;opacity:0.8;">答题 · 拼图 · 拖拽匹配</span>
        </button>

        <!-- 多人对弈 -->
        <button class="btn" onclick="goStep3('multi')"
          style="width:260px;padding:22px;border-radius:20px;flex-direction:column;display:flex;
                 align-items:center;gap:6px;background:linear-gradient(135deg,#8E44AD,#6C3483);
                 color:#FFF;font-size:1.2rem;box-shadow:0 4px 18px rgba(142,68,173,0.3);">
          <span style="font-size:2.2rem;">👥</span>
          <span>多人对弈</span>
          <span style="font-size:0.75rem;opacity:0.8;">异地联机 · 组队闯关</span>
        </button>
      </div>
    </div>

    <!-- ========== 第三屏：关卡列表 ========== -->
    <div id="step3" class="hidden animate-fade-in">
      <div style="text-align:center;margin-top:10px;">
        <button class="nav-back" onclick="goStep2()">← 返回模式选择</button>
      </div>

      <!-- 单人关卡 -->
      <div id="singleLevels" class="hidden">
        <div class="text-center" style="margin-top:20px;">
          <div style="font-size:2.5rem;">🎮</div>
          <h2 class="page-title">单人闯关</h2>
          <p class="page-subtitle">选择关卡，开始挑战！</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:12px;max-width:400px;margin:0 auto;">
          <a href="game1.html" class="btn btn-primary btn-lg" style="text-decoration:none;">
            📝 第一关 · 节日答题闯关
          </a>
          <a href="game2.html" class="btn btn-secondary btn-lg" style="text-decoration:none;">
            🧩 第二关 · 节日拼图游戏
          </a>
          <a href="game3.html" class="btn btn-success btn-lg" style="text-decoration:none;">
            🤝 第三关 · 习俗拖拽匹配
          </a>
          <a href="record.html" class="btn btn-outline btn-lg" style="text-decoration:none;">
            📖 错题本 & 学习档案
          </a>
        </div>
      </div>

      <!-- 多人关卡 -->
      <div id="multiLevels" class="hidden">
        <div class="text-center" style="margin-top:20px;">
          <div style="font-size:2.5rem;">👥</div>
          <h2 class="page-title">多人对弈</h2>
          <p class="page-subtitle">和朋友一起对战闯关！</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:12px;max-width:400px;margin:0 auto;">
          <a href="game4.html" class="btn btn-lg" style="text-decoration:none;
             background:linear-gradient(135deg,#8E44AD,#6C3483);color:#FFF;
             box-shadow:0 4px 18px rgba(142,68,173,0.3);">
            ⚔️ 第四关 · 双人对弈 PvP
          </a>
          <a href="game5.html" class="btn btn-lg" style="text-decoration:none;
             background:linear-gradient(135deg,#1ABC9C,#16A085);color:#FFF;
             box-shadow:0 4px 18px rgba(26,188,156,0.3);">
            🤝 第五关 · 组队闯关
          </a>
        </div>
      </div>
    </div>

    <!-- 底部 -->
    <div style="text-align:center;padding:24px;color:#BAA58F;font-size:0.78rem;">
      <p>🏫 中华传统节日文化科普教育 · 纯前端实现 · 支持异地联机</p>
    </div>
  </main>

  <style>
    /* ===== 节日标签动画 ===== */
    .festival-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 6px 14px; border-radius: 20px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; user-select: none;
      opacity: 0;
      transform: translateY(30px) scale(0.8);
      animation: tagPopIn 0.5s ease forwards;
      transition: all 0.3s ease;
    }
    .festival-tag::after { content: attr(data-text); }

    .tag-0 { animation-delay: 0.05s; }
    .tag-1 { animation-delay: 0.12s; }
    .tag-2 { animation-delay: 0.19s; }
    .tag-3 { animation-delay: 0.26s; }
    .tag-4 { animation-delay: 0.33s; }
    .tag-5 { animation-delay: 0.40s; }
    .tag-6 { animation-delay: 0.47s; }
    .tag-7 { animation-delay: 0.54s; }

    @keyframes tagPopIn {
      0%   { opacity:0; transform:translateY(30px) scale(0.8) rotate(-5deg); }
      60%  { opacity:1; transform:translateY(-3px) scale(1.08) rotate(2deg); }
      80%  { transform:translateY(1px) scale(0.97) rotate(-1deg); }
      100% { opacity:1; transform:translateY(0) scale(1) rotate(0); }
    }
    @keyframes tagFloat {
      0%,100% { transform:translateY(0) rotate(0); }
      25%     { transform:translateY(-6px) rotate(1deg); }
      75%     { transform:translateY(4px) rotate(-1deg); }
    }
    .festival-tag:hover {
      transform:translateY(-4px) scale(1.15) !important;
      box-shadow:0 6px 20px rgba(0,0,0,0.15);
      z-index:10;
    }
    .festival-row .festival-tag.anim-done {
      animation: none;
      opacity:1;
      transform:translateY(0) scale(1);
    }
  </style>

  <script>
    // ===== 页面路由 =====
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    const singleLevels = document.getElementById('singleLevels');
    const multiLevels = document.getElementById('multiLevels');
    const nameInput = document.getElementById('studentNameInput');
    const nameWarn = document.getElementById('nameWarn');

    const saved = getStudentName();
    if (saved) nameInput.value = saved;

    function goStep2() {
      step1.classList.add('hidden'); step2.classList.remove('hidden'); step3.classList.add('hidden');
      step2.classList.remove('animate-fade-in'); void step2.offsetWidth; step2.classList.add('animate-fade-in');
    }
    function goStep1() {
      step1.classList.remove('hidden'); step2.classList.add('hidden'); step3.classList.add('hidden');
      step1.classList.remove('animate-fade-in'); void step1.offsetWidth; step1.classList.add('animate-fade-in');
    }
    function goStep3(mode) {
      const name = nameInput.value.trim();
      if (!name) { nameWarn.style.display='block'; nameInput.style.borderColor='#E74C3C'; nameInput.focus(); return; }
      nameWarn.style.display='none'; nameInput.style.borderColor='#E8D5C4'; setStudentName(name);
      step2.classList.add('hidden'); step3.classList.remove('hidden');
      step3.classList.remove('animate-fade-in'); void step3.offsetWidth; step3.classList.add('animate-fade-in');
      if (mode==='single') { singleLevels.classList.remove('hidden'); multiLevels.classList.add('hidden'); }
      else { singleLevels.classList.add('hidden'); multiLevels.classList.remove('hidden'); }
    }
    nameInput.addEventListener('keydown', function(e) { if (e.key==='Enter') goStep3('single'); });
    nameInput.addEventListener('input', function() { nameWarn.style.display='none'; nameInput.style.borderColor='#E8D5C4'; });

    // ===== 节日标签连续动画 =====
    (function animateTags() {
      var tags = document.querySelectorAll('.festival-tag');
      var floats = [
        { amp:6,  dur:2.8, delay:0   },
        { amp:5,  dur:3.2, delay:0.4 },
        { amp:7,  dur:2.5, delay:0.8 },
        { amp:4,  dur:3.0, delay:1.2 },
        { amp:6,  dur:2.6, delay:1.6 },
        { amp:5,  dur:3.4, delay:2.0 },
        { amp:7,  dur:2.9, delay:2.4 },
        { amp:4,  dur:3.1, delay:2.8 },
      ];

      // 入场动画完成后开启浮动
      setTimeout(function() {
        tags.forEach(function(tag, i) {
          tag.classList.add('anim-done');
          var f = floats[i] || floats[0];
          tag.style.animation = 'tagFloat ' + f.dur + 's ease-in-out ' + f.delay + 's infinite';
        });

        // 周期性随机弹跳
        setInterval(function() {
          var idx = Math.floor(Math.random() * tags.length);
          var tag = tags[idx];
          tag.style.transform = 'translateY(-12px) scale(1.1)';
          tag.style.boxShadow = '0 8px 25px rgba(0,0,0,0.2)';
          setTimeout(function() {
            tag.style.transform = '';
            tag.style.boxShadow = '';
          }, 400);
        }, 3000);
      }, 700);
    })();
  </script>
</body>
</html>
