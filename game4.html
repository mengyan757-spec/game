<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第四关 · 双人对弈（异地联机）</title>
  <link rel="stylesheet" href="style.css">
  <script src="utils.js"></script>
</head>
<body>
  <div class="festival-decoration"></div>
  <nav class="nav-bar">
    <button class="nav-back" onclick="window.location.href='index.html'">← 返回首页</button>
    <span class="nav-title">⚔️ 第四关 · 双人对弈</span>
    <span id="connStatus" style="font-size:0.85rem;">未连接</span>
  </nav>

  <main class="container">
    <div id="connectPanel" class="animate-fade-in-up">
      <div class="card chinese-border" style="text-align:center;padding:32px 24px;">
        <div style="font-size:3rem;">🌐</div>
        <h2 class="page-title">异地联机双人对弈</h2>
        <p class="page-subtitle">两人输入相同房间号即可对战</p>

        <div id="nameRow" style="max-width:300px;margin:0 auto 14px;">
          <input type="text" id="localName" placeholder="你的名字" maxlength="8"
            style="width:100%;padding:11px 14px;border:2px solid #E8D5C4;border-radius:12px;
                   font-size:1rem;font-family:inherit;text-align:center;outline:none;">
        </div>

        <input type="text" id="roomCodeInput" placeholder="输入房间号（如 123456）" maxlength="20"
          style="width:100%;max-width:300px;padding:11px 14px;border:2px solid #E8D5C4;border-radius:12px;
                 font-size:1.1rem;font-family:monospace;text-align:center;outline:none;letter-spacing:3px;
                 margin-bottom:16px;text-transform:uppercase;">

        <div style="display:flex;gap:12px;justify-content:center;">
          <button class="btn btn-primary btn-lg" id="btnCreate" onclick="hostCreate()">🏠 创建房间</button>
          <button class="btn btn-outline btn-lg" id="btnJoin" onclick="guestJoin()">🚪 加入房间</button>
        </div>
        <div id="actionArea" style="max-width:520px;margin:20px auto 0;"></div>
        <div style="margin-top:16px;padding:12px;background:#F4ECF7;border-radius:12px;font-size:0.8rem;">
          💡 A创建 → B输入<strong>同一房间号</strong>点加入 → 自动对战！
        </div>
      </div>
    </div>

    <div id="gamePanel" class="hidden">
      <div class="card" style="margin-bottom:12px;padding:14px;">
        <div style="display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap;">
          <div id="p1Box" style="text-align:center;padding:8px 16px;border-radius:16px;background:#FDEDEC;min-width:90px;transition:all 0.3s;"><div style="font-size:1.3rem;">🔴</div><div style="font-weight:700;font-size:0.85rem;" id="gp1Name">--</div><div style="font-size:1.4rem;font-weight:900;color:#E74C3C;" id="gp1Score">0</div></div>
          <div style="font-size:1.2rem;font-weight:900;color:var(--color-gold);">VS</div>
          <div id="p2Box" style="text-align:center;padding:8px 16px;border-radius:16px;background:#EBF5FB;min-width:90px;transition:all 0.3s;"><div style="font-size:1.3rem;">🔵</div><div style="font-weight:700;font-size:0.85rem;" id="gp2Name">--</div><div style="font-size:1.4rem;font-weight:900;color:#2980B9;" id="gp2Score">0</div></div>
        </div>
        <div id="gameHint" style="text-align:center;margin-top:6px;font-size:0.8rem;color:var(--color-text-light);">准备中...</div>
        <div class="progress-bar" style="margin-top:8px;"><div id="gameProgress" class="progress-fill" style="width:0%;"></div></div>
      </div>
      <div id="waitPanel" class="hidden"><div class="card animate-pulse" style="text-align:center;padding:40px 24px;"><div style="font-size:3rem;">⏳</div><h3>对方正在答题...</h3><p style="color:var(--color-text-light);"><span id="waitName"></span> 思考中</p></div></div>
      <div id="quizPanel" class="hidden"><div class="card chinese-border animate-fade-in" style="padding:24px;"><span id="fBadge" class="festival-badge" style="margin-bottom:10px;display:inline-block;"></span><h3 id="qText" style="font-size:1.1rem;font-weight:700;margin-bottom:18px;line-height:1.6;"></h3><div id="optsList"></div><div id="fbArea" class="hidden" style="margin-top:14px;padding:14px;border-radius:12px;"></div></div></div>
    </div>

    <div id="resultPanel" class="hidden">
      <div class="card chinese-border animate-bounce-in" style="text-align:center;padding:40px 24px;">
        <div style="font-size:4rem;" id="rEmoji"></div><h2 class="page-title" id="rTitle" style="color:var(--color-primary);"></h2>
        <div style="display:flex;align-items:center;justify-content:center;gap:24px;margin:20px 0;">
          <div style="text-align:center;"><div style="font-size:2rem;">🔴</div><div id="r1Name" style="font-weight:700;">--</div><div id="r1Score" style="font-size:2rem;font-weight:900;color:#E74C3C;">0</div></div>
          <div style="font-size:1.5rem;">VS</div>
          <div style="text-align:center;"><div style="font-size:2rem;">🔵</div><div id="r2Name" style="font-weight:700;">--</div><div id="r2Score" style="font-size:2rem;font-weight:900;color:#2980B9;">0</div></div>
        </div>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;"><button class="btn btn-primary" onclick="location.reload()">🔄 再来一局</button><a href="index.html" class="btn btn-ghost">🏠 返回首页</a></div>
      </div>
    </div>
  </main>

  <script>
    // ==================== 配置 ====================
    const API = '/api/room/';
    let myName='', peerName='', roomCode='', isHost=false;
    let myScore=0, peerScore=0;
    let questions=[], ri=0, turn=0, myTurn=false;
    let pollTimer=null, lastSeq=0;

    // ==================== 名字管理 ====================
    function initName() {
      const saved = getStudentName();
      if (saved) {
        document.getElementById('localName').value = saved;
        document.getElementById('nameRow').style.display = 'none';
      }
      const lastRoom = loadData('last_room') || '';
      if (lastRoom) document.getElementById('roomCodeInput').value = lastRoom;
    }

    function ensureName() {
      const el = document.getElementById('localName');
      const val = el.value.trim() || getStudentName();
      if (!val) { showToast('请输入你的名字！'); el.focus(); return null; }
      myName = val;
      setStudentName(myName);
      if (el.parentElement.style.display !== 'none') el.parentElement.style.display = 'none';
      return myName;
    }

    // ==================== 按钮锁 ====================
    function lock(id,t) { const b=document.getElementById(id); b.disabled=true; b.textContent=t; }
    function unlock(id,t) { const b=document.getElementById(id); b.disabled=false; b.textContent=t; }

    // ==================== 服务器通信 ====================
    async function apiGet(path) {
      const resp = await fetch(API + encodeURIComponent(roomCode) + path);
      return resp.json();
    }
    async function apiPost(path, data) {
      const resp = await fetch(API + encodeURIComponent(roomCode) + path, {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
      });
      return resp.json();
    }

    function stopPoll() { if (pollTimer) { clearInterval(pollTimer); pollTimer=null; } }

    // ==================== A 创建房间 ====================
    async function hostCreate() {
      if (!ensureName()) return;
      roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();
      if (!roomCode || roomCode.length<2) { showToast('请设置房间号（至少2位）！'); return; }
      saveData('last_room', roomCode);
      isHost = true;
      lock('btnCreate','创建中...');
      document.getElementById('actionArea').innerHTML = '<div style="text-align:center;padding:20px;"><div style="font-size:1.5rem;">⏳</div><p>创建房间 <strong>'+roomCode+'</strong>...</p></div>';

      try {
        const r = await apiPost('/create', { hostName:myName });
        if (!r.ok) { showToast(r.error||'创建失败'); document.getElementById('actionArea').innerHTML=''; unlock('btnCreate','🏠 创建房间'); return; }

        document.getElementById('actionArea').innerHTML = `
          <div style="background:#E8F8F5;border-radius:16px;padding:24px;text-align:center;">
            <div style="font-size:2rem;">✅</div><h3>房间已创建</h3>
            <div style="background:#FFF;border:3px solid #27AE60;border-radius:16px;padding:16px;margin:16px 0;">
              <div style="font-size:2.5rem;font-weight:900;color:#E74C3C;letter-spacing:6px;">${roomCode}</div>
            </div>
            <p>告诉好友输入 <strong style="color:#E74C3C;">${roomCode}</strong> 点加入</p>
            <p class="animate-pulse" style="margin-top:10px;font-size:0.85rem;color:var(--color-text-light);">⏳ 等待对手加入...</p>
          </div>
        `;
        document.getElementById('connStatus').textContent = '🏠 '+roomCode;

        // 轮询等待 guest 加入
        waitForGuest();
      } catch(e) {
        showToast('创建失败: '+e.message); document.getElementById('actionArea').innerHTML=''; unlock('btnCreate','🏠 创建房间');
      }
    }

    async function waitForGuest() {
      for (let i=0; i<60; i++) {
        await new Promise(r => setTimeout(r, 1000));
        try {
          const r = await apiGet('/status');
          if (r.status === 'connected' && r.guestName) {
            peerName = r.guestName;
            document.getElementById('gp1Name').textContent = myName;
            document.getElementById('gp2Name').textContent = peerName;
            document.getElementById('connStatus').textContent = '🟢 已连接';
            showToast('🎉 '+peerName+' 加入了！', 1500);
            initGame();
            return;
          }
        } catch(e) {}
      }
      showToast('等待超时，对方未加入');
    }

    // ==================== B 加入房间 ====================
    async function guestJoin() {
      if (!ensureName()) return;
      roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();
      if (!roomCode) { showToast('请输入房间号！'); return; }
      saveData('last_room', roomCode);
      isHost = false;
      lock('btnJoin','加入中...');
      document.getElementById('actionArea').innerHTML = '<div style="text-align:center;padding:20px;"><div style="font-size:1.5rem;">🔍</div><p>查找房间 <strong>'+roomCode+'</strong>...</p></div>';

      try {
        // 先检查房间是否存在
        let room = await apiGet('/status');
        for (let attempt=0; (!room || room.error) && attempt<10; attempt++) {
          await new Promise(r => setTimeout(r, 1500));
          document.getElementById('actionArea').innerHTML = '<div style="text-align:center;padding:20px;"><div style="font-size:1.5rem;">🔍</div><p>查找中('+(attempt+1)+'/10)... 请确认好友已创建房间</p></div>';
          room = await apiGet('/status');
        }
        if (!room || room.error) { showToast('房间不存在！请确认房间号并让好友先创建'); unlock('btnJoin','🚪 加入房间'); document.getElementById('actionArea').innerHTML=''; return; }

        // 加入
        const r = await apiPost('/join', { guestName:myName });
        if (!r.ok) { showToast(r.error||'加入失败'); unlock('btnJoin','🚪 加入房间'); document.getElementById('actionArea').innerHTML=''; return; }

        peerName = r.hostName;
        document.getElementById('gp1Name').textContent = peerName;
        document.getElementById('gp2Name').textContent = myName;
        document.getElementById('connStatus').textContent = '🟢 '+roomCode;

        document.getElementById('actionArea').innerHTML = `
          <div style="background:#E8F8F5;border-radius:16px;padding:20px;text-align:center;">
            <div style="font-size:2rem;">🎉</div><h3>已加入房间 <span style="color:#E74C3C;">${roomCode}</span></h3>
            <p style="font-size:0.85rem;color:var(--color-text-light);">等待对手开始游戏...</p>
          </div>
        `;
        showToast('✅ 已加入！等待游戏开始', 1500);

        // 开始轮询消息
        startPolling();
      } catch(e) {
        showToast('加入失败: '+e.message); unlock('btnJoin','🚪 加入房间'); document.getElementById('actionArea').innerHTML='';
      }
    }

    // ==================== 游戏初始化（A端调用） ====================
    function initGame() {
      if (!isHost) return;
      const n=12;
      let pool=[...shuffle(VS_QUIZ_BANK)];
      while(pool.length<n) pool=pool.concat(shuffle(VS_QUIZ_BANK));
      questions=shuffle(pool).slice(0,n);
      ri=0; turn=0; myScore=0; peerScore=0; myTurn=true;

      document.getElementById('connectPanel').classList.add('hidden');
      document.getElementById('gamePanel').classList.remove('hidden');
      updateScores();

      // 发送游戏初始化给 B
      send({type:'game_init', qs:questions, hn:myName});

      // A 开始轮询 B 的消息
      startPolling();
      sendTurn();
    }

    // ==================== 消息轮询 ====================
    function startPolling() {
      stopPoll();
      pollTimer = setInterval(async () => {
        try {
          const r = await apiGet('/poll?since='+lastSeq);
          if (r.msgs) {
            r.msgs.forEach(m => { lastSeq = Math.max(lastSeq, m.seq); handleMsg(m.msg); });
          }
          if (r.status === 'connected' && !document.getElementById('gamePanel').classList.contains('hidden')) {
            // 继续
          }
        } catch(e) { /* 忽略网络错误 */ }
      }, 1000);
    }

    function send(msg) {
      apiPost('/msg', { msg, from:myName }).then(r => {
        if (r.seq) lastSeq = Math.max(lastSeq, r.seq);
      }).catch(()=>{});
    }

    // ==================== 消息处理 ====================
    function handleMsg(msg) {
      switch(msg.type) {
        case 'game_init':
          questions = msg.qs;
          if (!isHost) {
            peerName = msg.hn;
            document.getElementById('connectPanel').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');
          }
          ri=0; turn=0; myScore=0; peerScore=0; myTurn=isHost;
          updateScores();
          if (myTurn) sendTurn(); else showWait();
          break;
        case 'your_turn':
          ri=msg.ri;
          if (!isHost) { myTurn=true; showQuestion(msg.q); }
          break;
        case 'result':
          handleResult(msg); break;
        case 'game_over':
          finishGame(msg); break;
      }
    }

    // ==================== 游戏逻辑 ====================
    function sendTurn() {
      if (ri>=questions.length) { endGame(); return; }
      const q=questions[ri]; updateTurnStyles();
      if (isHost) {
        if (turn===0) {
          showQuestion(q);
          send({type:'your_turn', ri, q:null});
        } else {
          send({type:'your_turn', ri, q});
          showWait();
        }
      }
    }

    function showQuestion(q) {
      document.getElementById('waitPanel').classList.add('hidden');
      document.getElementById('quizPanel').classList.remove('hidden');
      document.getElementById('fbArea').classList.add('hidden');
      const f=FESTIVAL_DATA[q.festival];
      document.getElementById('fBadge').textContent=f.emoji+' '+f.name;
      document.getElementById('fBadge').style.background=f.bgColor;
      document.getElementById('fBadge').style.color=f.color;
      document.getElementById('qText').textContent=`[第${ri+1}/${questions.length}题] ${q.question}`;
      document.getElementById('gameHint').textContent='🎯 轮到你答题！';
      document.getElementById('gameProgress').style.width=(ri/questions.length*100)+'%';
      const L=['A','B','C','D'];
      document.getElementById('optsList').innerHTML=q.options.map((o,i)=>
        `<button class="option-btn" onclick="answer(${i})" id="opt${i}"><span style="display:inline-block;width:26px;height:26px;line-height:26px;background:var(--color-bg);border-radius:50%;text-align:center;font-weight:700;font-size:0.8rem;margin-right:8px;">${L[i]}</span>${o}</button>`).join('');
    }

    function showWait() {
      document.getElementById('quizPanel').classList.add('hidden');
      document.getElementById('waitPanel').classList.remove('hidden');
      document.getElementById('waitName').textContent=peerName;
      document.getElementById('gameHint').textContent='⏳ 对方答题中...';
      updateTurnStyles();
    }

    function updateTurnStyles() {
      const p1=document.getElementById('p1Box'),p2=document.getElementById('p2Box');
      const h=(isHost&&turn===0)||(!isHost&&turn===1);
      if(h){p1.style.transform='scale(1.06)';p1.style.boxShadow='0 0 16px rgba(231,76,60,0.3)';p1.style.border='3px solid #E74C3C';p2.style.transform='scale(1)';p2.style.boxShadow='';p2.style.border='3px solid transparent';}
      else{p2.style.transform='scale(1.06)';p2.style.boxShadow='0 0 16px rgba(41,128,185,0.3)';p2.style.border='3px solid #2980B9';p1.style.transform='scale(1)';p1.style.boxShadow='';p1.style.border='3px solid transparent';}
    }

    function answer(idx) {
      if(!myTurn)return;myTurn=false;
      const q=questions[ri],ok=idx===q.answer;
      document.querySelectorAll('#optsList .option-btn').forEach(b=>b.disabled=true);
      document.getElementById('opt'+q.answer).classList.add('correct');
      if(!ok)document.getElementById('opt'+idx).classList.add('wrong');
      if(ok)myScore+=10;updateScores();
      const fb=document.getElementById('fbArea');fb.classList.remove('hidden');
      if(ok){fb.style.background='#E8F8F5';fb.style.border='1px solid #27AE60';fb.innerHTML=`<div class="flex-center gap-2"><span>🎉</span><strong style="color:#27AE60;">正确！+10</strong></div><p style="font-size:0.85rem;">💡 ${q.knowledge}</p>`;}
      else{fb.style.background='#FDEDEC';fb.style.border='1px solid #E74C3C';fb.innerHTML=`<div class="flex-center gap-2"><span>😢</span><strong style="color:#E74C3C;">错误！答案：${q.options[q.answer]}</strong></div><p style="font-size:0.85rem;">💡 ${q.knowledge}</p>`;saveErrorQuestion({id:q.id,festival:q.festival,question:q.question,options:q.options,correctAnswer:q.answer,userAnswer:idx,knowledge:q.knowledge});}
      send({type:'result',ri,ans:idx,ok,ca:q.answer,co:q.options[q.answer],kn:q.knowledge,sc:myScore,nm:myName});
      setTimeout(nextRound,2000);
    }

    function handleResult(msg) {
      const q=questions[msg.ri];if(!q)return;peerScore=msg.sc;updateScores();
      if(!msg.ok)saveErrorQuestion({id:q.id,festival:q.festival,question:q.question,options:q.options,correctAnswer:msg.ca,userAnswer:msg.ans,knowledge:msg.kn});
      if(!myTurn){
        document.getElementById('waitPanel').classList.add('hidden');document.getElementById('quizPanel').classList.remove('hidden');document.getElementById('optsList').innerHTML='';
        document.getElementById('fBadge').textContent=FESTIVAL_DATA[q.festival].emoji+' '+FESTIVAL_DATA[q.festival].name;
        document.getElementById('qText').textContent=`[第${msg.ri+1}/${questions.length}题] ${q.question}`;
        const fb=document.getElementById('fbArea');fb.classList.remove('hidden');fb.style.background=msg.ok?'#EBF5FB':'#FDEDEC';fb.style.border=msg.ok?'1px solid #2980B9':'1px solid #E74C3C';
        fb.innerHTML=msg.ok?`<p><strong>${msg.nm}</strong> 正确！</p><p style="font-size:0.85rem;">💡 ${msg.kn}</p>`:`<p><strong>${msg.nm}</strong> 错误！</p><p>答案：<strong>${msg.co}</strong></p><p style="font-size:0.85rem;">💡 ${msg.kn}</p>`;
        setTimeout(nextRound,3000);
      }
    }

    function nextRound(){ri++;turn=1-turn;if(ri>=questions.length){if(isHost)endGame();return;}if(isHost){myTurn=(turn===0);sendTurn();}}
    function updateScores(){if(isHost){document.getElementById('gp1Score').textContent=myScore;document.getElementById('gp2Score').textContent=peerScore;}else{document.getElementById('gp2Score').textContent=myScore;document.getElementById('gp1Score').textContent=peerScore;}}
    function endGame(){stopPoll();const hS=isHost?myScore:peerScore,gS=isHost?peerScore:myScore;const hN=isHost?myName:peerName,gN=isHost?peerName:myName;const win=hS>gS?hN:(gS>hS?gN:'平局');send({type:'game_over',hS,gS,hN,gN,win});saveVsRecord({player1:hN,player2:gN,p1Score:hS,p2Score:gS,totalRounds:questions.length,winner:win});showResult(hN,gN,hS,gS,win);}
    function finishGame(msg){stopPoll();saveVsRecord({player1:msg.hN,player2:msg.gN,p1Score:msg.hS,p2Score:msg.gS,totalRounds:questions.length,winner:msg.win});showResult(msg.hN,msg.gN,msg.hS,msg.gS,msg.win);}
    function showResult(hN,gN,hS,gS,win){document.getElementById('gamePanel').classList.add('hidden');document.getElementById('resultPanel').classList.remove('hidden');document.getElementById('r1Name').textContent=hN;document.getElementById('r2Name').textContent=gN;document.getElementById('r1Score').textContent=hS;document.getElementById('r2Score').textContent=gS;const won=win===myName;document.getElementById('rEmoji').textContent=win==='平局'?'🤝':(won?'🏆':'💪');document.getElementById('rTitle').textContent=win==='平局'?'势均力敌·平局！':(won?'你赢了！':'对方获胜！');document.getElementById('resultPanel').scrollIntoView({behavior:'smooth'});stars();}
    function stars(){const e=['⭐','🌟','✨','🎉','🏆'];for(let i=0;i<30;i++)setTimeout(()=>{const s=document.createElement('span');s.className='star-particle';s.textContent=e[Math.floor(Math.random()*e.length)];s.style.left=Math.random()*90+'%';s.style.top=(Math.random()*40+30)+'%';document.body.appendChild(s);setTimeout(()=>s.remove(),1500)},i*50);}

    initName();
  </script>
</body>
</html>
